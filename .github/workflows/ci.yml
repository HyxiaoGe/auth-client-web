name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 校验 npm 发布工作流门禁
        run: npm run check:publish-workflow

      - name: 安装依赖
        run: npm ci

      - name: 检查高危依赖
        run: npm audit --audit-level=high

      - name: 类型检查
        run: npm run typecheck

      - name: 运行测试
        run: npm test

      - name: 构建发布产物
        run: npm run build

      - name: 检查 npm 包结构
        run: npm run lint:package

      - name: 检查发布包内容
        run: npm run pack:dry-run
